# YDLidar G4 – same limits as tb3_outdoor_nav2/config/ydlidar_g4_params.yaml
# Root key: ydlidar_ros2_driver_node (matches ydlidar_ros2_driver ydlidar_launch.py).
#
# Geometry: 120° arc centered at 120° → angle_min=60, angle_max=180.
# Range: max 0.4 m (G4 min ~0.12 m).

ydlidar_ros2_driver_node:
  ros__parameters:
    port: "/dev/ttyUSB0"
    baudrate: 230400
    frame_id: "laser_frame"
    ignore_array: ""
    lidar_type: 1
    device_type: 0
    sample_rate: 9
    abnormal_check_count: 4
    fixed_resolution: true
    reversion: false
    inverted: false
    auto_reconnect: true
    isSingleChannel: false
    intensity: false
    intensity_bit: 0
    support_motor_dtr: false
    angle_min: 60.0
    angle_max: 180.0
    range_min: 0.12
    range_max: 0.4
    frequency: 12.0
    invalid_range_is_inf: false
    debug: false
